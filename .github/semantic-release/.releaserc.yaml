plugins:
  - - '@semantic-release/commit-analyzer'
    - preset: 'angular'
      releaseRules:
        - type: 'chore'
          scope: 'deps'
          release: 'patch'
        - type: 'chore'
          scope: 'deps-dev'
          release: 'patch'
        - type: 'build'
          scope: 'deps'
          release: 'patch'
  - 'conventional-changelog-conventionalcommits'
  - - '@semantic-release/release-notes-generator'
    - preset: 'conventionalcommits'
      presetConfig:
        types:
          - type: 'feat'
            section: 'Features'
          - type: 'fix'
            section: 'Bug Fixes'
          - type: 'chore'
            scope: 'deps'
            section: 'Dependency Updates'
            hidden: false
          - type: 'build'
            scope: 'deps'
            section: 'Dependency Updates'
            hidden: false
  - '@semantic-release/github'