name: release

on:
  push:
    branches:
      - main
      - master
      - v*.*
    paths-ignore:
      - README.md
      - CHANGELOG.md
      - docs/**
      - .github/**
      - .gitea/**

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cp .env.dist .env
      - uses: falti/dotenv-action@v1
        id: dotenv
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: false

  update-changelog:
    needs:
      - docker-build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PUSH_ACCESS_TOKEN }}
      - run: git fetch && git pull
      - name: copy config files
        run: |
          if [ ! -f ".releaserc.yaml" ]; then

            if [ -d ".github" ]; then
              cp .github/semantic-release/.releaserc.yaml . \
                && printf "copied: %s\n" ".releaserc.yaml" \
                && exit 0;
            fi

            if [ -d ".gitea" ]; then
              cp .gitea/semantic-release/.releaserc.yaml . \
                && printf "copied: %s\n" ".releaserc.yaml" \
                && exit 0;
            fi

          fi
      - uses: cycjimmy/semantic-release-action@v6
        id: semantic-release
        with:
          dry_run: true
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: editing CHANGELOG.md
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: |
          echo "${{ steps.semantic-release.outputs.new_release_notes }}" > new_release_notes.txt
          cat new_release_notes.txt CHANGELOG.md > NEW_CHANGELOG.md
          mv NEW_CHANGELOG.md CHANGELOG.md
          rm new_release_notes.txt
      - run: git status
        if: steps.semantic-release.outputs.new_release_published == 'true'
      - name: commit and push
        if: steps.semantic-release.outputs.new_release_published == 'true'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add CHANGELOG.md
          git commit -m "docs(changelog): auto-update CHANGELOG.md"
          git push

  release:
    needs:
      - update-changelog
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - run: git fetch && git pull
      - name: copy config files
        run: |
          if [ ! -f ".releaserc.yaml" ]; then

            if [ -d ".github" ]; then
              cp .github/semantic-release/.releaserc.yaml . \
                && printf "copied: %s\n" ".releaserc.yaml" \
                && exit 0;
            fi

            if [ -d ".gitea" ]; then
              cp .gitea/semantic-release/.releaserc.yaml . \
                && printf "copied: %s\n" ".releaserc.yaml" \
                && exit 0;
            fi

          fi
      - uses: cycjimmy/semantic-release-action@v6
        id: semantic-release
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}